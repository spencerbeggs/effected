# Dependabot configuration for pnpm monorepo
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Root workspace dependencies
  - package-ecosystem: "npm"
    directories:
      - "/"
    # repos/effect-smol is a read-only git subtree of Effect-TS/effect-smol, pinned to the
    # tag matching the `effect` catalog. It is not a pnpm workspace member and has no lockfile
    # importers, so nothing inside it is ever installed and its manifests carry no runtime risk.
    # Left unexcluded, Dependabot opens PRs bumping dependencies in the vendored source, which
    # buys no security and diverges the subtree from the upstream tag it is supposed to mirror,
    # turning the next re-pin into a conflict resolution.
    exclude-paths:
      - "repos/**"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 10
    groups:
      # Group all non-major updates together
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore"
      include: "scope"
    assignees:
      - "spencerbeggs"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    labels:
      - "dependencies"
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

# Additional configuration notes:
# - Uses pnpm via npm ecosystem (Dependabot handles pnpm lockfiles)
# - Groups minor and patch updates to reduce PR noise
# - Monthly updates for individual packages to avoid disruption
# - Weekly updates for root and critical dependencies
# - Includes GitHub Actions updates for CI/CD maintenance
# - Conventional commit messages matching your commitlint config
